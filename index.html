<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { background: transparent; margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; font-family: sans-serif; }

        /* LOADING SCREEN */
        #loader { position: fixed; width: 220px; height: 210px; background: #080808; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; border-radius: 12px; border: 1.5px solid #00ffff; }
        .spinner { width: 40px; height: 40px; border: 4px solid #111; border-top: 4px solid #00ffff; border-radius: 50%; animation: spin 0.5s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* MAIN UI */
        .main-container { width: 220px; height: 210px; background: #0d0d0d; border: 1.5px solid #00ffff; border-radius: 12px; display: none; flex-direction: column; position: relative; }
        .header { background: #00ffff; color: #000; font-weight: 900; text-align: center; font-size: 11px; padding: 5px; border-top-left-radius: 10px; border-top-right-radius: 10px; text-transform: uppercase; }
        .content { flex: 1; padding: 8px; display: flex; flex-direction: column; gap: 6px; }
        
        input, textarea { width: 100%; background: #151515; border: 1px solid #333; color: #00ffcc; padding: 7px; border-radius: 6px; font-size: 10px; font-family: monospace; }
        textarea { height: 60px; resize: none; border-left: 3px solid #00ffff; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        button { background: #1a1a1a; color: #fff; border: 1px solid #444; padding: 8px; border-radius: 6px; font-size: 10px; font-weight: bold; }
        button:active { background: #00ffff; color: #000; transform: scale(0.92); }

        .inject-btn { background: linear-gradient(90deg, #00ffff, #0088ff); color: #000; border: none; padding: 10px; font-weight: 900; border-radius: 6px; margin-top: auto; }

        /* LIST OVERLAY */
        #listMenu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #080808; z-index: 100; display: none; flex-direction: column; padding: 10px; border-radius: 10px; }
        .list-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1.5px solid #00ffff; padding-bottom: 5px; margin-bottom: 5px; }
        .scroll-area { flex: 1; overflow-y: auto; }
        
        /* ADJUSTED SCRIPT ITEM */
        .script-item { 
            background: #121212; 
            padding: 10px; 
            margin-bottom: 8px; 
            border-radius: 8px; 
            display: flex; 
            flex-direction: column; /* Ginawa kong column para lumaki ang buttons */
            gap: 8px;
            border-left: 4px solid #00ffff; 
        }

        /* PINALAKING LETRA NG NAME */
        .item-name { 
            font-size: 13px; 
            color: #ffffff; 
            font-weight: 900; 
            text-transform: uppercase;
            overflow: hidden; 
            text-overflow: ellipsis; 
            white-space: nowrap; 
        }

        /* PINALAKING BUTTONS (EXE & DEL) */
        .item-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; width: 100%; }
        .btn-exe { background: #00ff00; color: #000; border: none; padding: 12px; font-size: 11px; border-radius: 5px; font-weight: 900; text-align: center; }
        .btn-del { background: #ff4444; color: #fff; border: none; padding: 12px; font-size: 11px; border-radius: 5px; font-weight: 900; text-align: center; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="spinner"></div>
        <p style="color:#00ffff; font-size:9px; margin-top:10px; font-weight:bold; letter-spacing:2px;">HYBRID V3 READY</p>
    </div>

    <div class="main-container" id="mainUI">
        <div class="header">HYBRID INJECTOR</div>
        <div class="content">
            <input type="text" id="nInput" placeholder="SCRIPT NAME">
            <textarea id="cInput" placeholder="LUA CODE / RAW LINK"></textarea>
            <div class="btn-grid">
                <button type="button" onclick="save()">SAVE</button>
                <button type="button" onclick="showList()">LIST</button>
            </div>
            <button type="button" class="inject-btn" onclick="execute(document.getElementById('cInput').value)">INITIALIZE INJECTION</button>
        </div>

        <div id="listMenu">
            <div class="list-header">
                <span style="color:#00ffff; font-size:11px; font-weight:bold;">SAVED DATABASE</span>
                <button style="background:#333; border:none; color:white; padding:5px 12px; border-radius:5px; font-weight:900;" onclick="hideList()">X</button>
            </div>
            <div class="scroll-area" id="listArea"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('hybrid_storage') || '[]');

        setTimeout(() => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('mainUI').style.display = 'flex';
        }, 1200);

        function execute(code) {
            if(!code) return;
            if(window.Android) {
                window.Android.startInjection(code);
                window.Android.showMessage("Sent to Engine!");
            }
        }

        function save() {
            const n = document.getElementById('nInput').value;
            const c = document.getElementById('cInput').value;
            if(!n || !c) return;
            db.push({name: n, code: c});
            localStorage.setItem('hybrid_storage', JSON.stringify(db));
            document.getElementById('nInput').value = '';
            document.getElementById('cInput').value = '';
            if(window.Android) window.Android.showMessage("Script Saved!");
            render();
        }

        function remove(i) {
            db.splice(i, 1);
            localStorage.setItem('hybrid_storage', JSON.stringify(db));
            render();
        }

        function showList() { render(); document.getElementById('listMenu').style.display = "flex"; }
        function hideList() { document.getElementById('listMenu').style.display = "none"; }

        function render() {
            const area = document.getElementById('listArea');
            area.innerHTML = db.length ? "" : "<div style='text-align:center;font-size:10px;color:#444;margin-top:20px;'>No Scripts</div>";
            db.forEach((item, i) => {
                area.innerHTML += `
                    <div class="script-item">
                        <span class="item-name">${item.name}</span>
                        <div class="item-btns">
                            <button class="btn-exe" onclick="runFromList(${i})">EXECUTE</button>
                            <button class="btn-del" onclick="remove(${i})">DELETE</button>
                        </div>
                    </div>`;
            });
        }

        function runFromList(i) {
            execute(db[i].code);
            hideList();
        }

        window.onload = render;
    </script>
</body>
</html>
